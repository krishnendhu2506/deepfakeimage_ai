services:
  - type: web
    name: fake-image-detector
    env: python
    plan: free
    rootDir: fake_image_detector
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.9
